<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>今天吃什么决定器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
:root{
  --bg:#f5f7fa;
  --card:#fff;
  --text:#333;
  --gray:#666;
  --border:#eee;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#161616;
    --card:#242424;
    --text:#eaeaea;
    --gray:#aaa;
    --border:#333;
  }
}
body{background:var(--bg);color:var(--text);padding:16px;max-width:420px;margin:0 auto}

.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin: 10px 0 20px;
}
.title {
  font-size: 24px;
  font-weight: bold;
}
.lang-select {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 14px;
  outline: none;
}

.location-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--card);
  padding: 10px 16px;
  border-radius: 14px;
  margin-bottom: 16px;
  box-shadow: 0 2px 10px #00000008;
}
.location-bar span { font-weight: bold; font-size: 15px; }
.location-bar select {
  width: auto; margin-bottom: 0; padding: 6px 12px; border: none; 
  background: var(--bg); border-radius: 8px; font-weight: bold; color: var(--text);
}

.random-btn{background:#FF7A00;color:#fff;font-size:18px;font-weight:bold;width:100%;padding:16px;border:none;border-radius:16px;margin-bottom:16px}

.result{background:#FFF4E5;color:#FF5C00;padding:14px;border-radius:14px;text-align:center;font-size:17px;font-weight:bold;margin-bottom:16px;cursor:pointer;user-select:none;transition:transform 0.1s;}
.result:active{transform:scale(0.98);}
.result.hide{display:none}

.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 10px #00000008;margin-bottom:16px}
.card h3{font-size:17px;margin-bottom:12px}

input[type="text"],textarea,select{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;margin-bottom:12px;font-size:16px;background:var(--card);color:var(--text)}

.form-row { display: flex; gap: 10px; margin-bottom: 12px; }
.form-row select { flex: 0 0 100px; margin-bottom: 0; } 
.form-row input { flex: 1; margin-bottom: 0; } 

.custom-file-container {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 12px;
}
.custom-file-btn { background: #eef2ff; color: #4E6EF2; padding: 6px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; }
.custom-file-text { font-size: 14px; color: var(--gray); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.add-btn{background:#4E6EF2;color:#fff;width:100%;padding:14px;border:none;border-radius:14px;font-size:16px}
.tab{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab button{padding:8px 12px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text)}
.tab button.active{background:#4E6EF2;color:#fff;border-color:#4E6EF2}

.item{display:flex;align-items:center;background:var(--card);border-radius:14px;padding:10px;margin-bottom:10px;transition:all 0.3s;}
.item img{width:70px;height:70px;object-fit:cover;border-radius:10px;margin-right:12px}
.item-info{flex:1}
.item-name{font-weight:bold;font-size:16px;margin-bottom:4px}
.item-desc{font-size:13px;color:var(--gray)}
.item-tags{margin-top:4px; display:flex; gap:6px; flex-wrap:wrap;}
.item-tag{font-size:12px;background:#f0f0f0;color:#555;padding:2px 6px;border-radius:4px;}
.tag-loc{background:#e3f2fd; color:#1976d2;} 

.btns{display:flex;gap:8px;margin-top:8px}
.btns button{flex:1;padding:6px 0;border-radius:8px;border:none;font-size:14px;cursor:pointer;}
.btn-edit{background:#eef2ff;color:#4E6EF2}
.btn-del{background:#ffebee;color:#f44336}
.btn-eat{background:#e8f5e9;color:#2e7d32}

.btn-export{background:#e8f5e9;color:#2e7d32;}
.btn-import{background:#fff3e0;color:#ef6c00;}

.item-highlight {
  animation: flashHighlight 1.5s ease-out;
}
@keyframes flashHighlight {
  0% { box-shadow: 0 0 0 3px #FF7A00; transform: scale(1.02); }
  100% { box-shadow: 0 0 0 0 transparent; transform: scale(1); }
}
</style>
</head>
<body>

<div class="header">
  <div class="title" data-i18n="title">🍔 决定器</div>
  <select class="lang-select" id="langSelect">
    <option value="zh-CN">简体中文</option>
    <option value="zh-TW">繁體中文</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
  </select>
</div>

<div class="location-bar">
  <span data-i18n="currentLocLabel">📍 当前位置</span>
  <select id="globalLoc">
  </select>
</div>

<button class="random-btn" id="randomBtn" data-i18n="randomBtn">帮我随机选一个！</button>
<div class="result hide" id="result"></div>

<div class="card">
  <h3 id="formTitle" data-i18n="formTitleAdd">添加外卖</h3>
  <input type="text" id="name" data-i18n="namePlaceholder" placeholder="店铺/菜品名称">
  <textarea id="desc" rows="2" data-i18n="descPlaceholder" placeholder="评价或备注"></textarea>
  
  <div class="form-row">
    <select id="cate">
      <option value="staple" data-i18n="cateStaple">主食</option>
      <option value="drink" data-i18n="cateDrink">奶茶</option>
    </select>
    <input type="text" id="foodLoc" data-i18n="locPlaceholder" placeholder="地点(不填默认不限)">
  </div>
  
  <div class="custom-file-container">
    <input type="file" id="img" accept="image/*" style="display: none;">
    <label for="img" class="custom-file-btn" data-i18n="chooseFileBtn">选择图片</label>
    <span class="custom-file-text" id="customFileText" data-i18n="noFileText">未选择文件</span>
  </div>
  
  <button class="add-btn" id="save" data-i18n="saveBtn">保存</button>
</div>

<div class="tab">
  <button class="active" data-cate="all" data-i18n="tabAll">全部</button>
  <button data-cate="staple" data-i18n="cateStaple">主食</button>
  <button data-cate="drink" data-i18n="cateDrink">奶茶</button>
</div>

<div id="list"></div>

<div class="card" style="margin-top: 20px;">
  <h3 data-i18n="dataBackupTitle">数据备份与恢复</h3>
  <div class="btns" style="margin-top: 0;">
    <button class="btn-export" id="exportBtn" data-i18n="exportBtn">导出数据</button>
    <button class="btn-import" id="importBtn" data-i18n="importBtn">导入数据</button>
    <input type="file" id="importInput" accept=".json" style="display: none;">
  </div>
</div>

<script>
const i18n = {
  'zh-CN': {
    title: "🍔 决定器", randomBtn: "帮我随机选一个！", formTitleAdd: "添加外卖", formTitleEdit: "编辑外卖 (保留原图则不选)",
    namePlaceholder: "店铺/菜品名称", descPlaceholder: "评价或备注", cateStaple: "主食", cateDrink: "奶茶",
    saveBtn: "保存", tabAll: "全部", btnEdit: "编辑", btnDel: "删除", btnEat: "今天吃过",
    chooseFileBtn: "选择图片", noFileText: "未选择文件",
    confirmDel: "确定删除？", alertName: "请填写名称", alertImg: "请上传图片", alertEaten: "今天没东西可吃啦！", eatResultPrefix: "✅ 今天就吃：",
    dataBackupTitle: "数据备份与恢复", exportBtn: "导出数据", importBtn: "导入数据", importSuccess: "导入成功！", importFail: "导入失败，请检查文件格式。",
    currentLocLabel: "📍 当前位置", locPlaceholder: "地点(不填默认不限)", locAll: "不限地点", clickToView: "👉 点击查看详情"
  },
  'zh-TW': {
    title: "🍔 決定器", randomBtn: "幫我隨機選一個！", formTitleAdd: "添加外送", formTitleEdit: "編輯外送 (保留原圖則不選)",
    namePlaceholder: "店鋪/菜品名稱", descPlaceholder: "評價或備註", cateStaple: "主餐", cateDrink: "飲品",
    saveBtn: "儲存", tabAll: "全部", btnEdit: "編輯", btnDel: "刪除", btnEat: "今天吃過",
    chooseFileBtn: "選擇圖片", noFileText: "未選擇文件",
    confirmDel: "確定刪除？", alertName: "請填寫名稱", alertImg: "請上傳圖片", alertEaten: "今天沒東西可吃啦！", eatResultPrefix: "✅ 今天就吃：",
    dataBackupTitle: "數據備份與恢復", exportBtn: "導出數據", importBtn: "導入數據", importSuccess: "導入成功！", importFail: "導入失敗，請檢查文件格式。",
    currentLocLabel: "📍 當前位置", locPlaceholder: "地點(不填預設不限)", locAll: "不限地點", clickToView: "👉 點擊查看詳情"
  },
  'en': {
    title: "🍔 Food Picker", randomBtn: "Pick for me!", formTitleAdd: "Add Food", formTitleEdit: "Edit (Leave img blank to keep)",
    namePlaceholder: "Shop/Dish Name", descPlaceholder: "Review or Notes", cateStaple: "Meals", cateDrink: "Drinks", 
    saveBtn: "Save", tabAll: "All", btnEdit: "Edit", btnDel: "Delete", btnEat: "Ate Today",
    chooseFileBtn: "Choose Image", noFileText: "No file chosen",
    confirmDel: "Are you sure to delete?", alertName: "Please enter a name", alertImg: "Please upload an image", alertEaten: "Nothing left to eat today!", eatResultPrefix: "✅ Today's Pick: ",
    dataBackupTitle: "Data Backup", exportBtn: "Export", importBtn: "Import", importSuccess: "Import successful!", importFail: "Import failed.",
    currentLocLabel: "📍 Location", locPlaceholder: "Location (blank = anywhere)", locAll: "Anywhere", clickToView: "👉 Click to view details"
  },
  'ja': {
    title: "🍔 ご飯ルーレット", randomBtn: "ランダムに選ぶ！", formTitleAdd: "追加する", formTitleEdit: "編集 (画像未選択で維持)",
    namePlaceholder: "店名/料理名", descPlaceholder: "メモ・評価", cateStaple: "メイン", cateDrink: "ドリンク",
    saveBtn: "保存する", tabAll: "すべて", btnEdit: "編集", btnDel: "削除", btnEat: "今日食べた",
    chooseFileBtn: "画像を選択", noFileText: "選択されていません",
    confirmDel: "本当に削除しますか？", alertName: "名前を入力してください", alertImg: "画像をアップロードしてください", alertEaten: "今日はもう食べるものがありません！", eatResultPrefix: "✅ 今日のご飯：",
    dataBackupTitle: "データバックアップ", exportBtn: "エクスポート", importBtn: "インポート", importSuccess: "インポート成功！", importFail: "インポート失敗。",
    currentLocLabel: "📍 現在地", locPlaceholder: "場所(空白で制限なし)", locAll: "すべて", clickToView: "👉 クリックして詳細を見る"
  }
}

const list = document.getElementById('list')
const result = document.getElementById('result')
const fileInput = document.getElementById('img')
const customFileText = document.getElementById('customFileText')
let foods = JSON.parse(localStorage.getItem('foods')) || []
let eatenToday = JSON.parse(localStorage.getItem('eatenToday')) || []
let currentCate = 'all'
let editId = -1 
let currentLang = localStorage.getItem('app_lang') || 'zh-CN'
let currentGlobalLoc = localStorage.getItem('app_global_loc') || 'all'
let currentPickedId = null; 

foods.forEach(f => {
  if (f.cate === '主食') f.cate = 'staple'
  if (f.cate === '奶茶') f.cate = 'drink'
  if (!f.location || f.location === 'all') f.location = ''
  if (f.location === 'home') f.location = '家'
  if (f.location === 'office') f.location = '公司'
})

document.getElementById('globalLoc').addEventListener('change', function(e) {
  currentGlobalLoc = e.target.value;
  localStorage.setItem('app_global_loc', currentGlobalLoc);
  render();
});

function t(key) { return i18n[currentLang][key] || key }

function updateGlobalLocDropdown() {
  const locSelect = document.getElementById('globalLoc');
  const uniqueLocs = [...new Set(foods.map(f => f.location).filter(l => l.trim() !== ''))];

  locSelect.innerHTML = `<option value="all">${t('locAll')}</option>`;
  uniqueLocs.forEach(loc => {
    const opt = document.createElement('option');
    opt.value = loc;
    opt.innerText = loc;
    locSelect.appendChild(opt);
  });

  if (uniqueLocs.includes(currentGlobalLoc) || currentGlobalLoc === 'all') {
    locSelect.value = currentGlobalLoc;
  } else {
    locSelect.value = 'all';
    currentGlobalLoc = 'all';
    localStorage.setItem('app_global_loc', 'all');
  }
}

function initLanguage() {
  document.getElementById('langSelect').value = currentLang;
  updateLanguageUI();
  
  document.getElementById('langSelect').onchange = (e) => {
    currentLang = e.target.value;
    localStorage.setItem('app_lang', currentLang);
    updateLanguageUI();
    if(currentPickedId && !result.classList.contains('hide')) {
      const pick = foods.find(x => x.id === currentPickedId);
      if(pick) {
        const displayCate = pick.cate === 'staple' ? t('cateStaple') : (pick.cate === 'drink' ? t('cateDrink') : pick.cate);
        result.innerHTML = `<div>${t('eatResultPrefix')}${pick.name}（${displayCate}）</div><div style="font-size:13px;margin-top:6px;opacity:0.8;">${t('clickToView')}</div>`;
      }
    }
  }
}

function updateLanguageUI() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n')
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      el.placeholder = t(key)
    } else {
      el.textContent = t(key) 
    }
  })
  if (editId !== -1) {
    document.getElementById('formTitle').textContent = t('formTitleEdit')
  }
  updateGlobalLocDropdown(); 
  render();
}

function checkNewDay() {
  const today = new Date().toDateString()
  const lastDate = localStorage.getItem('lastDate')
  if (lastDate !== today) {
    eatenToday = [] 
    localStorage.setItem('lastDate', today)
    save()
  }
}

function save(){
  localStorage.setItem('foods', JSON.stringify(foods))
  localStorage.setItem('eatenToday', JSON.stringify(eatenToday))
  updateGlobalLocDropdown(); 
}

function clearForm() {
  document.getElementById('name').value = ''
  document.getElementById('desc').value = ''
  document.getElementById('foodLoc').value = '' 
  fileInput.value = '' 
  customFileText.textContent = t('noFileText')
  customFileText.setAttribute('data-i18n', 'noFileText')
  document.getElementById('formTitle').textContent = t('formTitleAdd')
  editId = -1
}

fileInput.addEventListener('change', function() {
  if (this.files && this.files.length > 0) {
    customFileText.textContent = this.files[0].name;
    customFileText.removeAttribute('data-i18n'); 
  } else {
    customFileText.textContent = t('noFileText');
    customFileText.setAttribute('data-i18n', 'noFileText');
  }
});

function render(){
  const uneaten = foods.filter(f => !eatenToday.includes(f.id));
  const locFiltered = currentGlobalLoc === 'all' ? uneaten : uneaten.filter(f => !f.location || f.location === currentGlobalLoc);
  const show = currentCate === 'all' ? locFiltered : locFiltered.filter(f => f.cate === currentCate);

  list.innerHTML = show.map(f => {
    const displayCate = f.cate === 'staple' ? t('cateStaple') : (f.cate === 'drink' ? t('cateDrink') : f.cate);
    const displayLoc = f.location ? f.location : t('locAll');
    
    return `
    <div class="item" id="item-${f.id}">
      <img src="${f.img}">
      <div class="item-info">
        <div class="item-name">${f.name}</div>
        <div class="item-desc">${f.desc}</div>
        <div class="item-tags">
          <span class="item-tag">${displayCate}</span>
          <span class="item-tag tag-loc">📍 ${displayLoc}</span>
        </div>
        <div class="btns">
          <button class="btn-edit" onclick="edit(${f.id})">${t('btnEdit')}</button>
          <button class="btn-del" onclick="del(${f.id})">${t('btnDel')}</button>
          <button class="btn-eat" onclick="eat(${f.id})">${t('btnEat')}</button>
        </div>
      </div>
    </div>`
  }).join('')
}

function eat(id){ eatenToday.push(id); save(); render(); }

function del(id){
  if(!confirm(t('confirmDel'))) return
  foods = foods.filter(f => f.id !== id)
  eatenToday = eatenToday.filter(eId => eId !== id)
  save(); render();
  if(editId === id) clearForm()
}

function edit(id){
  const f = foods.find(x => x.id === id)
  if(!f) return
  document.getElementById('name').value = f.name
  document.getElementById('desc').value = f.desc
  document.getElementById('cate').value = f.cate
  document.getElementById('foodLoc').value = f.location || '' 
  document.getElementById('formTitle').textContent = t('formTitleEdit')
  editId = id 
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      const MAX_SIZE = 800;
      if (width > height) {
        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
      } else {
        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
      }
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6);
      callback(compressedDataUrl);
    }
    img.src = e.target.result;
  }
  reader.readAsDataURL(file);
}

document.getElementById('save').onclick = ()=>{
  const name = document.getElementById('name').value.trim()
  const desc = document.getElementById('desc').value.trim()
  const cate = document.getElementById('cate').value
  const foodLoc = document.getElementById('foodLoc').value.trim() 
  const file = fileInput.files[0]
  
  if(!name) return alert(t('alertName'))
  
  if(editId !== -1){ 
    const f = foods.find(x => x.id === editId)
    if(f) {
      f.name = name; f.desc = desc; f.cate = cate; f.location = foodLoc;
      if(file){
        compressImage(file, (compressedImg) => {
          f.img = compressedImg; save(); render(); clearForm();
        });
        return 
      }
    }
    save(); render(); clearForm();
  } else { 
    if(!file) return alert(t('alertImg'))
    compressImage(file, (compressedImg) => {
      foods.push({ id: Date.now(), name, desc, cate, location: foodLoc, img: compressedImg })
      save(); render(); clearForm();
    });
  }
}

document.getElementById('randomBtn').onclick = ()=>{
  const pool = foods.filter(f => {
    const notEaten = !eatenToday.includes(f.id);
    const matchLoc = currentGlobalLoc === 'all' || !f.location || f.location === currentGlobalLoc;
    return notEaten && matchLoc;
  });
  
  if(pool.length === 0) {
    result.classList.add('hide')
    return alert(t('alertEaten'))
  }
  const pick = pool[Math.floor(Math.random()*pool.length)]
  currentPickedId = pick.id; 
  
  const displayCate = pick.cate === 'staple' ? t('cateStaple') : (pick.cate === 'drink' ? t('cateDrink') : pick.cate)
  
  result.classList.remove('hide')
  result.innerHTML = `<div>${t('eatResultPrefix')}${pick.name}（${displayCate}）</div><div style="font-size:13px;margin-top:6px;opacity:0.8;">${t('clickToView')}</div>`;
}

document.getElementById('result').onclick = () => {
  if (!currentPickedId) return;
  
  const targetFood = foods.find(f => f.id === currentPickedId);
  if (!targetFood) return;

  if (currentCate !== 'all' && targetFood.cate !== currentCate) {
    currentCate = 'all';
    document.querySelectorAll('.tab button').forEach(x => {
      if (x.dataset.cate === 'all') x.classList.add('active');
      else x.classList.remove('active');
    });
    render();
  }

  const targetEl = document.getElementById('item-' + currentPickedId);
  if (targetEl) {
    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    
    targetEl.classList.remove('item-highlight');
    void targetEl.offsetWidth; 
    targetEl.classList.add('item-highlight');
  }
};

document.querySelectorAll('.tab button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.tab button').forEach(x=>x.classList.remove('active'))
    b.classList.add('active')
    currentCate = b.dataset.cate
    render()
  }
})

save(); checkNewDay(); initLanguage();

document.getElementById('exportBtn').onclick = () => {
  const exportData = { foods: foods, eatenToday: eatenToday, lastDate: localStorage.getItem('lastDate') };
  const dataStr = JSON.stringify(exportData);
  const blob = new Blob([dataStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = "food_picker_backup.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
};

const importInput = document.getElementById('importInput');
document.getElementById('importBtn').onclick = () => { importInput.click(); };
importInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const importedData = JSON.parse(event.target.result);
      if (importedData && importedData.foods && Array.isArray(importedData.foods)) {
        foods = importedData.foods;
        foods.forEach(f => { if (!f.location || f.location === 'all') f.location = ''; });
        eatenToday = importedData.eatenToday || [];
        if(importedData.lastDate) localStorage.setItem('lastDate', importedData.lastDate);
        save(); updateGlobalLocDropdown(); render(); alert(t('importSuccess'));
      } else alert(t('importFail'));
    } catch (err) { alert(t('importFail')); }
    importInput.value = '';
  };
  reader.readAsText(file);
});
